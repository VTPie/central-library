name: Setup PHP
description: Set up PHP environment

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.2"
        extensions: mbstring, xml, curl, zip
        coverage: none
