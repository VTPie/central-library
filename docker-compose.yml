services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - library-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - library-volume:/var/lib/mysql
    networks:
      - library-network
    ports:
      - "3306:3306"

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - library-network

  redis:
    image: redis:latest
    container_name: my-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - library-network

networks:
  library-network:
    driver: bridge

volumes:
  library-volume:
